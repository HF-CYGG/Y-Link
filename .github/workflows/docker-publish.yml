name: docker-publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 计算 Docker Hub 命名空间
        id: prepare
        shell: bash
        run: |
          namespace="${{ vars.DOCKERHUB_NAMESPACE }}"
          if [ -z "$namespace" ]; then
            namespace="${{ github.repository_owner }}"
          fi
          namespace="$(echo "$namespace" | tr '[:upper:]' '[:lower:]')"
          echo "namespace=$namespace" >> "$GITHUB_OUTPUT"

      - name: 启用 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 启用 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 生成前端镜像元数据
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ steps.prepare.outputs.namespace }}/y-link-frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}
          cache-from: type=gha,scope=y-link-frontend
          cache-to: type=gha,mode=max,scope=y-link-frontend

      - name: 生成后端镜像元数据
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ steps.prepare.outputs.namespace }}/y-link-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}
          cache-from: type=gha,scope=y-link-backend
          cache-to: type=gha,mode=max,scope=y-link-backend
