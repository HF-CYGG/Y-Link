name: docker-publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
      - 'release-v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 计算镜像仓库与推送规则
        id: prepare
        shell: bash
        run: |
          namespace="${{ vars.DOCKERHUB_NAMESPACE }}"
          if [ -z "$namespace" ]; then
            namespace="${{ github.repository_owner }}"
          fi
          namespace="$(echo "$namespace" | tr '[:upper:]' '[:lower:]')"
          echo "namespace=$namespace" >> "$GITHUB_OUTPUT"

          gh_owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "gh_owner=$gh_owner" >> "$GITHUB_OUTPUT"

          acr_registry="${{ vars.ACR_REGISTRY }}"
          if [ -z "$acr_registry" ]; then
            acr_registry="crpi-9gmsq2s17re73ia9.cn-qingdao.personal.cr.aliyuncs.com"
          fi
          acr_namespace="${{ vars.ACR_NAMESPACE }}"
          if [ -z "$acr_namespace" ]; then
            acr_namespace="yyh163"
          fi
          acr_push_mode="${{ vars.ACR_PUSH_MODE }}"
          if [ -z "$acr_push_mode" ]; then
            acr_push_mode="release_tag_only"
          fi
          echo "acr_registry=$acr_registry" >> "$GITHUB_OUTPUT"
          echo "acr_namespace=$acr_namespace" >> "$GITHUB_OUTPUT"
          echo "acr_push_mode=$acr_push_mode" >> "$GITHUB_OUTPUT"

          acr_enabled="false"
          if [ -n "${ACR_USERNAME}" ] && [ -n "${ACR_PASSWORD}" ]; then
            case "$acr_push_mode" in
              all)
                acr_enabled="true"
                ;;
              release_tag_only)
                if [[ "${GITHUB_REF}" == refs/tags/release-v* ]]; then
                  acr_enabled="true"
                fi
                ;;
              *)
                echo "Unsupported ACR_PUSH_MODE=$acr_push_mode, fallback to release_tag_only"
                if [[ "${GITHUB_REF}" == refs/tags/release-v* ]]; then
                  acr_enabled="true"
                fi
                ;;
            esac
          fi
          echo "acr_enabled=$acr_enabled" >> "$GITHUB_OUTPUT"

          frontend_images="ghcr.io/${gh_owner}/y-link-frontend"
          backend_images="ghcr.io/${gh_owner}/y-link-backend"
          onebox_images="ghcr.io/${gh_owner}/y-link-onebox"

          # Docker Hub 可选推送
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            frontend_images="docker.io/${namespace}/y-link-frontend"$'\n'"${frontend_images}"
            backend_images="docker.io/${namespace}/y-link-backend"$'\n'"${backend_images}"
            onebox_images="docker.io/${namespace}/y-link-onebox"$'\n'"${onebox_images}"
          fi

          # 阿里云 ACR 可选推送
          # onebox 默认推到 y-link，方便直接用于部署
          if [ "$acr_enabled" = "true" ]; then
            frontend_images="${acr_registry}/${acr_namespace}/y-link-frontend"$'\n'"${frontend_images}"
            backend_images="${acr_registry}/${acr_namespace}/y-link-backend"$'\n'"${backend_images}"
            onebox_images="${acr_registry}/${acr_namespace}/y-link"$'\n'"${onebox_images}"
          fi

          {
            echo "frontend_images<<EOF"
            echo "$frontend_images"
            echo "EOF"
            echo "backend_images<<EOF"
            echo "$backend_images"
            echo "EOF"
            echo "onebox_images<<EOF"
            echo "$onebox_images"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 启用 QEMU
        uses: docker/setup-qemu-action@v4

      - name: 启用 Buildx
        uses: docker/setup-buildx-action@v4

      - name: 登录 Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 登录阿里云 ACR
        if: ${{ steps.prepare.outputs.acr_enabled == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ steps.prepare.outputs.acr_registry }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: 生成前端镜像元数据
        id: frontend_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.prepare.outputs.frontend_images }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}
          cache-from: type=gha,scope=y-link-frontend
          cache-to: type=gha,mode=max,scope=y-link-frontend

      - name: 生成后端镜像元数据
        id: backend_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.prepare.outputs.backend_images }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}
          cache-from: type=gha,scope=y-link-backend
          cache-to: type=gha,mode=max,scope=y-link-backend

      - name: 生成 onebox 镜像元数据
        id: onebox_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.prepare.outputs.onebox_images }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: 构建并推送 onebox 镜像
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.onebox
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.onebox_meta.outputs.tags }}
          labels: ${{ steps.onebox_meta.outputs.labels }}
          cache-from: type=gha,scope=y-link-onebox
          cache-to: type=gha,mode=max,scope=y-link-onebox
