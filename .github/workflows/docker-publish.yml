#
# 文件说明：GitHub Actions Docker 发布流水线。
# 实现逻辑：
# 1. 在主分支推送、版本标签推送或手动触发时执行；
# 2. 始终发布 GHCR 镜像，若配置了 Docker Hub 凭据则额外发布 Docker Hub 镜像；
# 3. 分别构建前端、后端与 onebox 三类镜像，并复用 GHA 构建缓存。
#
name: docker-publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 计算 Docker Hub 和 GHCR 命名空间
        id: prepare
        shell: bash
        run: |
          namespace="${{ vars.DOCKERHUB_NAMESPACE }}"
          if [ -z "$namespace" ]; then
            namespace="${{ github.repository_owner }}"
          fi
          namespace="$(echo "$namespace" | tr '[:upper:]' '[:lower:]')"
          echo "namespace=$namespace" >> "$GITHUB_OUTPUT"

          gh_owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "gh_owner=$gh_owner" >> "$GITHUB_OUTPUT"

          frontend_images="ghcr.io/${gh_owner}/y-link-frontend"
          backend_images="ghcr.io/${gh_owner}/y-link-backend"
          onebox_images="ghcr.io/${gh_owner}/y-link-onebox"

          # 仅在 Docker Hub 凭据完整时追加 Docker Hub 镜像地址，
          # 避免“登录允许失败但推送仍强制包含 docker.io 标签”导致整条流水线失败。
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            frontend_images="docker.io/${namespace}/y-link-frontend"$'\n'"${frontend_images}"
            backend_images="docker.io/${namespace}/y-link-backend"$'\n'"${backend_images}"
            onebox_images="docker.io/${namespace}/y-link-onebox"$'\n'"${onebox_images}"
          fi

          {
            echo "frontend_images<<EOF"
            echo "$frontend_images"
            echo "EOF"
            echo "backend_images<<EOF"
            echo "$backend_images"
            echo "EOF"
            echo "onebox_images<<EOF"
            echo "$onebox_images"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 启用 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 启用 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成前端镜像元数据
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prepare.outputs.frontend_images }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}
          cache-from: type=gha,scope=y-link-frontend
          cache-to: type=gha,mode=max,scope=y-link-frontend

      - name: 生成后端镜像元数据
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prepare.outputs.backend_images }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}
          cache-from: type=gha,scope=y-link-backend
          cache-to: type=gha,mode=max,scope=y-link-backend

      - name: 生成单镜像一键部署元数据
        id: onebox_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prepare.outputs.onebox_images }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: 构建并推送单镜像一键部署镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.onebox
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.onebox_meta.outputs.tags }}
          labels: ${{ steps.onebox_meta.outputs.labels }}
          cache-from: type=gha,scope=y-link-onebox
          cache-to: type=gha,mode=max,scope=y-link-onebox
