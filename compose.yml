#
# 文件说明：本地/服务器默认分体部署编排文件。
# 实现逻辑：
# 1. `backend` 使用 SQLite 落盘，适合快速部署与小规模一体化场景；
# 2. `frontend` 负责托管静态资源，并通过 Nginx 反向代理后端 API；
# 3. 通过 volume 持久化 SQLite 数据，并通过健康检查串联前后端启动顺序。
#
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_TYPE: sqlite
      SQLITE_DB_PATH: /app/data/y-link.sqlite
      DB_SYNC: "false"
    volumes:
      - y_link_sqlite_data:/app/data
    ports:
      - "3001:3001"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3001/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test:
        - CMD-SHELL
        # 既校验前端静态页可访问，也校验 Nginx 到后端的 /health 代理链路可用。
        - wget -q -O /dev/null http://127.0.0.1/ && wget -q -O /dev/null http://127.0.0.1/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    restart: unless-stopped

volumes:
  y_link_sqlite_data:
