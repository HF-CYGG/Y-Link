#
# 文件说明：onebox 单镜像部署时使用的 Nginx 站点配置。
# 实现逻辑：
# 1. 继续托管前端静态资源；
# 2. 将 `/api` 与 `/health` 代理到同容器内的 Node 后端；
# 3. 通过占位符端口在容器启动时由入口脚本按实际 `PORT` 动态替换。
#
server {
    listen 80 default_server;
    server_name _;
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:__BACKEND_PORT__/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # onebox 模式下上传文件也由后端进程托管，
    # 必须把 `/uploads/*` 代理回 Node 服务，否则图片 URL 会落到前端静态目录导致 404。
    location /uploads/ {
        proxy_pass http://127.0.0.1:__BACKEND_PORT__/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /health {
        proxy_pass http://127.0.0.1:__BACKEND_PORT__/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
