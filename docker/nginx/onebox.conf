#
# 文件说明：onebox 单镜像部署时使用的 Nginx 站点配置。
# 实现逻辑：
# 1. 继续托管前端静态资源；
# 2. 将 `/api` 与 `/health` 代理到同容器内的 Node 后端；
# 3. 通过占位符端口在容器启动时由入口脚本按实际 `PORT` 动态替换。
#
server {
    listen 80 default_server;
    server_name _;
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    # 文本类前端静态资源开启 gzip，降低首屏与切页二次加载体积。
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # 前端静态托管层统一补基础安全头，避免浏览器做内容嗅探或被外部页面嵌入。
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self' http: https: ws: wss:;" always;

    root /usr/share/nginx/html;
    index index.html;

    # Vite 构建出的 hash 资源可长期缓存，减少重复下载。
    location ~* \.(?:css|js|mjs|json|map|svg|ico|png|jpe?g|webp|gif|woff2?|ttf|otf|eot)$ {
        try_files $uri =404;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # 入口 HTML 需要及时拿到最新版本，避免用户长期缓存旧入口引用已失效的 hash 资源。
    location = /index.html {
        try_files /index.html =404;
        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:__BACKEND_PORT__/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # onebox 模式下上传文件也由后端进程托管，
    # 必须把 `/uploads/*` 代理回 Node 服务，否则图片 URL 会落到前端静态目录导致 404。
    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:__BACKEND_PORT__/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /health {
        proxy_pass http://127.0.0.1:__BACKEND_PORT__/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
