#
# 文件说明：前端分体部署容器的固定 Nginx 站点配置。
# 实现逻辑：
# 1. 托管 Vite 构建后的静态资源；
# 2. 把 `/api` 与 `/health` 转发给 compose 内的 `backend:3001`；
# 3. 对所有前端业务路由执行 history 模式回退。
#
map $status $ylink_log_abnormal {
    ~^[23] 0;
    default 1;
}

map "$request_method $request_uri" $ylink_log_important {
    default 0;
    ~^(POST|PUT|PATCH|DELETE)\s+/api/ 1;
    ~^GET\s+/(?!api/|assets/|uploads/|health(?:\?|$))(?:$|[^.?]*(?:\?.*)?$) 1;
}

map "$request_uri:$status:$time_iso8601" $ylink_log_health_sample {
    default 0;
    ~^/health(?:\?.*)?:200:[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]T[0-9][0-9]:[0-5]0:[0-1][0-4] 1;
}

map "$ylink_log_abnormal$ylink_log_important$ylink_log_health_sample" $ylink_access_log_enabled {
    "000" 0;
    default 1;
}

map $request_uri $ylink_attack_class {
    default normal;
    ~^/wp-admin/ wp_probe;
    ~^/wp-includes/ wp_probe;
    ~^/xmlrpc\.php(?:\?|$) wp_probe;
    ~*^/phpmyadmin(?:/|\?|$) admin_probe;
    ~^/admin(?:/|\?|$) admin_probe;
    ~^/cgi-bin/ cgi_probe;
    ~^/nacos/ nacos_probe;
    ~^/theme/ theme_probe;
    ~^/user/umi\.min\.js(?:\?|$) umi_probe;
    ~^/\.env(?:[._~-][^/?]*)?(?:\?|$) secret_probe;
    ~^/(?:api|app|src|config|backend|frontend|server|web|public|private|var)/\.env(?:[._~-][^/?]*)?(?:\?|$) secret_probe;
    ~^/\.envrc(?:\?|$) secret_probe;
    ~^/\.flaskenv(?:\?|$) secret_probe;
    ~^/(?:config|secrets|credentials)\.json(?:\?|$) secret_probe;
    ~^/aws-config\.js(?:\?|$) secret_probe;
    ~^/(?:serviceAccountKey|service-account|firebase-service-account|google-service-account)\.json(?:\?|$) secret_probe;
    ~^/docker-compose(?:\.[^/?]+)?\.ya?ml(?:\?|$) secret_probe;
    ~^/\.git/HEAD(?:\?|$) git_probe;
    ~^/(?:.*/)?(?:webuploader|ueditor)(?:/|\?|$) editor_probe;
    ~^/api/v1/guest/comm/config(?:\?|$) external_api_probe;
    ~^/v[0-9]+/(?:models|logging)(?:/|\?|$) external_api_probe;
    ~^/robots\.txt(?:\?|$) crawler_probe;
}

limit_req_zone $binary_remote_addr zone=ylink_auth_login:10m rate=12r/m;
limit_req_zone $binary_remote_addr zone=ylink_auth_captcha:10m rate=30r/m;

log_format ylink_combined '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                          'proxy="$realip_remote_addr" xff="$http_x_forwarded_for" real="$http_x_real_ip" '
                          'attack="$ylink_attack_class"';

server {
    listen 80;
    server_name _;

    set_real_ip_from 127.0.0.1;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    access_log /dev/stdout ylink_combined if=$ylink_access_log_enabled;

    # 文本类前端静态资源开启 gzip，降低首屏与切页二次加载体积。
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # 前端静态托管层统一补基础安全头，避免浏览器做内容嗅探或被外部页面嵌入。
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self';" always;

    # 托管前端静态资源目录。
    root /usr/share/nginx/html;
    index index.html;

    # Vite 构建出的 hash 资源可长期缓存，减少重复下载。
    location ~* \.(?:css|js|mjs|json|map|svg|ico|png|jpe?g|webp|gif|woff2?|ttf|otf|eot)$ {
        try_files $uri =404;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # 入口 HTML 需要及时拿到最新版本，避免用户长期缓存旧入口引用已失效的 hash 资源。
    location = /index.html {
        try_files /index.html =404;
        add_header Cache-Control "no-store" always;
    }

    location = /favicon.ico {
        try_files /favicon.ico =404;
        access_log off;
        log_not_found off;
    }

    location = /xmlrpc.php { return 404; }
    location = /.env { return 404; }
    location = /config.json { return 404; }
    location = /aws-config.js { return 404; }
    location = /secrets.json { return 404; }
    location = /credentials.json { return 404; }
    location = /serviceAccountKey.json { return 404; }
    location = /service-account.json { return 404; }
    location = /firebase-service-account.json { return 404; }
    location = /google-service-account.json { return 404; }
    location = /api/v1/guest/comm/config { return 404; }
    location = /user/umi.min.js { return 404; }
    location = /uploads/ { return 404; }
    location = /.envrc { return 404; }
    location = /.flaskenv { return 404; }
    location = /.git/HEAD { return 404; }

    location ^~ /wp-admin/ { return 404; }
    location ^~ /wp-includes/ { return 404; }
    location ^~ /phpmyadmin/ { return 404; }
    location ^~ /api/.env { return 404; }
    location ^~ /cgi-bin/ { return 404; }
    location ^~ /nacos/ { return 404; }
    location ^~ /theme/ { return 404; }

    location ~ ^/\.env(?:[._~-][^/]*)?$ { return 404; }
    location ~ ^/(?:app|src|config|backend|frontend|server|web|public|private|var)/\.env(?:[._~-][^/]*)?$ { return 404; }
    location ~ ^/docker-compose(?:\.[^/]+)?\.ya?ml$ { return 404; }
    location ~ ^/(?:.*/)?(?:webuploader|ueditor)(?:/|$) { return 404; }
    location ~ ^/v[0-9]+/(?:models|logging)(?:/|$) { return 404; }
    location ~* ^/phpmyadmin(?:/|$) { return 404; }

    location = /api/auth/login {
        limit_req zone=ylink_auth_login burst=5 nodelay;
        proxy_pass http://backend:3001/api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /api/client-auth/login {
        limit_req zone=ylink_auth_login burst=5 nodelay;
        proxy_pass http://backend:3001/api/client-auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /api/auth/captcha {
        limit_req zone=ylink_auth_captcha burst=8 nodelay;
        proxy_pass http://backend:3001/api/auth/captcha;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /api/client-auth/captcha {
        limit_req zone=ylink_auth_captcha burst=8 nodelay;
        proxy_pass http://backend:3001/api/client-auth/captcha;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /api/auth/me {
        proxy_pass http://backend:3001/api/auth/me;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        add_header Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;
        add_header Vary "Authorization, Cookie" always;
    }

    location = /api/client-auth/me {
        proxy_pass http://backend:3001/api/client-auth/me;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        add_header Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;
        add_header Vary "Authorization, Cookie" always;
    }

    location ~ ^/(?:login|dashboard|order-entry|order-list|supplier-delivery|supplier-history|inbound-scan|inbound-manage|base-data(?:/.*)?|o2o-console(?:/.*)?|system(?:/.*)?|client(?:/.*)?)$ {
        if ($request_method !~ ^(GET|HEAD)$) { return 405; }
        try_files /index.html =404;
        add_header Cache-Control "no-store" always;
    }

    location = / {
        if ($request_method !~ ^(GET|HEAD)$) { return 405; }
        try_files /index.html =404;
        add_header Cache-Control "no-store" always;
    }

    location / {
        return 404;
    }

    # API 反向代理：
    # - 保持前端默认 /api 前缀不变；
    # - 通过 compose 内部服务名 backend 转发到 Node 服务。
    location ^~ /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # 商品图片等上传资源实际由后端进程托管，必须显式代理，避免被前端静态目录误吞。
    location ^~ /uploads/ {
        proxy_pass http://backend:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # 健康检查也转发到后端，便于容器联调时直接探活。
    location = /health {
        proxy_pass http://backend:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
