#
# 文件说明：前端分体部署容器的固定 Nginx 站点配置。
# 实现逻辑：
# 1. 托管 Vite 构建后的静态资源；
# 2. 把 `/api` 与 `/health` 转发给 compose 内的 `backend:3001`；
# 3. 对所有前端业务路由执行 history 模式回退。
#
map $status $ylink_log_abnormal {
    ~^[23] 0;
    default 1;
}

server {
    listen 80;
    server_name _;
    access_log /dev/stdout combined if=$ylink_log_abnormal;

    # 文本类前端静态资源开启 gzip，降低首屏与切页二次加载体积。
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # 前端静态托管层统一补基础安全头，避免浏览器做内容嗅探或被外部页面嵌入。
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self' http: https: ws: wss:;" always;

    # 托管前端静态资源目录。
    root /usr/share/nginx/html;
    index index.html;

    # Vite 构建出的 hash 资源可长期缓存，减少重复下载。
    location ~* \.(?:css|js|mjs|json|map|svg|ico|png|jpe?g|webp|gif|woff2?|ttf|otf|eot)$ {
        try_files $uri =404;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # 入口 HTML 需要及时拿到最新版本，避免用户长期缓存旧入口引用已失效的 hash 资源。
    location = /index.html {
        try_files /index.html =404;
        add_header Cache-Control "no-store" always;
    }

    # Vue Router history 模式回退：
    # - 优先返回真实静态文件；
    # - 其余路径统一回落到 index.html 交给前端路由处理。
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理：
    # - 保持前端默认 /api 前缀不变；
    # - 通过 compose 内部服务名 backend 转发到 Node 服务。
    location ^~ /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # 商品图片等上传资源实际由后端进程托管，必须显式代理，避免被前端静态目录误吞。
    location ^~ /uploads/ {
        proxy_pass http://backend:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # 健康检查也转发到后端，便于容器联调时直接探活。
    location = /health {
        proxy_pass http://backend:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
