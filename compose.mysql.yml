#
# 文件说明：外置 MySQL 分体部署编排模板。
# 实现逻辑：
# 1. 仅启动前端与后端应用容器，数据库由外部 MySQL 提供；
# 2. 推荐搭配 `.env.docker.mysql` 注入连接信息，避免把真实库配置写死在编排文件中；
# 3. 前端健康检查同时覆盖静态资源与后端代理链路，便于部署平台正确识别可用状态。
#
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_TYPE: mysql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME}
      DB_SYNC: ${DB_SYNC:-false}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    extra_hosts:
      # 为 Linux / WSL 等环境补齐宿主机别名；在 Docker Desktop 下也可保持兼容。
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3001/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    healthcheck:
      test:
        - CMD-SHELL
        # 前端容器只有在页面与后端代理都可用时才视为健康。
        - wget -q -O /dev/null http://127.0.0.1/ && wget -q -O /dev/null http://127.0.0.1/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
    restart: unless-stopped
